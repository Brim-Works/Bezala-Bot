[phases.setup]
# weasyprint kräver pango + cairo + harfbuzz + glib + libffi som systemdeps.
# Railway-produktion kraschade tidigare på "cannot load library
# 'libgobject-2.0-0'" → gobject-introspection + freetype tillagda.
nixPkgs = [
  "python311",
  "nodejs_20",
  "gcc",
  "gobject-introspection",
  "pango",
  "cairo",
  "harfbuzz",
  "glib",
  "libffi",
  "fontconfig",
  "freetype",
]

[phases.install]
cmds = [
  "python3.11 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r requirements.txt",
  "cd frontend && npm install && npm run build"
]

[start]
cmd = "/opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT"
